spring.application.name=userservice
server.port=8083
auth-service.url=http://authservice:8081
order-service.url=http://orderservice:8082
user-service.url=http://userservice:8083
security.public.endpoints =/actuator/**

# Logging
logging.level.com.mymicroservice.userservice=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate=WARN

# For metrics: /health, /metrics, /beans, /prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# DataBase
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=disable
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name = org.postgresql.Driver

# Liquibase
spring.liquibase.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=disable
spring.liquibase.user=${DB_USER}
spring.liquibase.password=${DB_PASSWORD}
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Redis
spring.data.redis.host=redis
spring.data.redis.port=6379




